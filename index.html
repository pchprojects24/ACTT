::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }

.loading { display: flex; justify-content: center; align-items: center; padding: 60px; color: var(--text-muted); font-size: 1rem; }

/* Skip to content link */
.skip-link {
  position: fixed; top: -100px; left: 16px; z-index: 9999;
  background: var(--accent); color: #fff; padding: 10px 18px;
  border-radius: 0 0 var(--radius) var(--radius); font-weight: 700;
  transition: top 0.2s; text-decoration: none;
}
.skip-link:focus { top: 0; color: #fff; text-decoration: none; }

/* Focus-visible rings for all interactive elements */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}
button:focus-visible, a:focus-visible, [tabindex]:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}

/* Back to top button */
.back-to-top {
  position: fixed; bottom: 24px; right: 20px; z-index: 80;
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); color: #fff; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-md); cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  border: none;
}
.back-to-top.visible { opacity: 1; pointer-events: auto; }
.back-to-top:hover { transform: translateY(-2px); background: var(--accent-hover); }
@media (max-width: 768px) { .back-to-top { bottom: max(20px, env(safe-area-inset-bottom)); right: 16px; } }

/* Toast notifications */
.toast-container {
  position: fixed; bottom: 80px; right: 20px; z-index: 500;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast {
  padding: 10px 16px; background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: var(--shadow-md);
  font-size: 0.88rem; color: var(--text-primary);
  animation: toastIn 0.25s ease, toastOut 0.3s ease 2.2s forwards;
  pointer-events: auto;
}
.toast.toast-success { border-left: 3px solid var(--severity-green); }
.toast.toast-info { border-left: 3px solid var(--accent); }
@keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(20px); } }

/* CCT role cards */
.cct-role-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin: 14px 0 20px; }
.cct-role-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
  border-top: 3px solid var(--accent);

.march-card {
  border-radius: var(--radius); padding: 14px 16px;

  border-left: 4px solid var(--accent);
}

/* CCT escalation banner */
.escalation-banner {
  background: var(--severity-red-bg); border: 1px solid var(--severity-red);

.mist-card {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  border: 1px solid var(--border); border-radius: var(--radius);

.freq-badge.stable { background: var(--severity-green-bg); color: var(--severity-green); border: 1px solid var(--severity-green); }

.op-cl-table th{background:var(--bg-tertiary);padding:8px 12px;text-align:left;font-weight:600;border:1px solid var(--border);font-size:0.78rem;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;color:var(--text-secondary)}
.op-cl-table td{padding:10px 12px;border:1px solid var(--border);vertical-align:top}
.op-cl-table tr:nth-child(even) td{background:var(--bg-secondary)}
.op-cl-table tr:hover td{background:var(--bg-tertiary)}
.item-label{font-weight:500;color:var(--text-primary);margin-bottom:4px;line-height:1.4}
.item-note{font-size:0.8rem;color:var(--text-muted);line-height:1.5;font-style:italic}
.op-cl-initial{width:72px;padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:0.875rem;text-align:center;font-family:inherit;display:block;transition:border-color var(--transition)}
.op-cl-initial:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,0.15)}
.op-cl-initial.filled{border-color:var(--severity-green);background:var(--severity-green-bg);color:var(--severity-green)}
.op-cl-user-notes{width:100%;min-width:120px;padding:5px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:0.8rem;font-family:inherit;resize:vertical;min-height:36px;transition:border-color var(--transition)}
.op-cl-user-notes:focus{outline:none;border-color:var(--accent)}
.op-cl-actions{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
.op-cl-summary{display:flex;align-items:center;gap:16px;padding:10px 0;color:var(--text-secondary);font-size:0.88rem;flex-wrap:wrap}
.op-cl-summary strong{color:var(--accent)}
@media(max-width:768px){.op-cl-table th:nth-child(2),.op-cl-table th:nth-child(3),.op-cl-table td:nth-child(2),.op-cl-table td:nth-child(3){min-width:60px}.op-cl-initial{width:52px}}

.visually-hidden{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.search-tools{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.search-filter{padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:var(--bg-secondary);color:var(--text-primary);font-size:0.78rem}
.search-status{font-size:0.75rem;color:var(--text-muted);margin:4px 2px 2px}
.metadata-banner{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 14px}
.meta-pill{font-size:0.76rem;padding:4px 8px;border-radius:999px;background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border)}
.quiz-block{margin-top:18px;border:1px solid var(--border);border-radius:var(--radius);padding:14px;background:var(--bg-card)}
.quiz-option{display:block;width:100%;text-align:left;border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-top:8px;background:var(--bg-secondary)}
.quiz-option:hover{border-color:var(--accent)}
.quiz-option.correct{border-color:var(--severity-green);background:var(--severity-green-bg)}
.quiz-option.incorrect{border-color:var(--severity-red);background:var(--severity-red-bg)}
.progress-hint{margin:10px 0 0;color:var(--text-secondary);font-size:0.86rem}
.cl-item{display:flex;align-items:flex-start;gap:10px}
.cl-item:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

@media print{
  .app-header,.app-sidebar,.sidebar-overlay,.op-cl-actions,.section-actions,.expand-collapse-btns,.back-to-top,.toast-container,.section-nav-actions,.breadcrumbs{display:none!important}
  .cct-role-grid{grid-template-columns:repeat(2,1fr)!important}
  .march-grid{grid-template-columns:repeat(2,1fr)!important}
  .mist-card{grid-template-columns:repeat(2,1fr)!important}
  .escalation-banner,.severity-card{break-inside:avoid;print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .shipboard-callout-body{display:block!important}
  .app-header,.app-sidebar,.sidebar-overlay,.op-cl-actions,.section-actions,.expand-collapse-btns{display:none!important}
  .app-main{margin:0;padding:12px;height:auto;overflow:visible}
  .op-cl-meta{border:1px solid #ccc;background:#f9f9f9}
  .op-cl-meta input{border:1px solid #aaa;background:#fff;color:#000}
  .op-cl-preamble{background:#eef3fa;border:1px solid #aac}
  .op-cl-section-hdr{background:#ddd;color:#000;border:1px solid #bbb}
  .op-cl-group-hdr{background:#eef;color:#224;border:1px solid #bbb}
  .op-cl-table th{background:#eee;color:#000;border:1px solid #999}
  .op-cl-table td{border:1px solid #bbb;color:#000}
  .op-cl-table tr:nth-child(even) td{background:#f5f5f5}
  .item-label{color:#000}.item-note{color:#555}
  .op-cl-initial{border:1px solid #888;background:#fff;color:#000;-webkit-print-color-adjust:exact}
  .op-cl-user-notes{border:1px solid #888;background:#fff;color:#000}
  body{background:#fff;color:#000}
  a{color:#000;text-decoration:none}
  .breadcrumbs,.section-subtitle{display:none}
}
/* ---------- Reference Library ---------- */
.lib-filter{margin:12px 0 18px}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin:10px 0 22px}
.lib-grid-featured{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.lib-card{display:flex;flex-direction:column;gap:6px;padding:14px;border:1px solid var(--border);background:var(--bg-elevated);border-radius:10px;text-decoration:none;color:var(--text-primary);transition:transform .15s,border-color .15s,box-shadow .15s}
.lib-card:hover{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.lib-card-top{display:flex;align-items:center;gap:6px;font-size:.72rem}
.lib-ext{display:inline-block;padding:2px 7px;background:var(--accent);color:#fff;border-radius:4px;font-weight:700;letter-spacing:.04em}
.lib-tag{display:inline-block;padding:2px 7px;border:1px solid var(--border-strong,var(--border));border-radius:4px;color:var(--text-secondary);font-weight:600}
.lib-title{font-size:.95rem;font-weight:600;line-height:1.35;color:var(--text-primary)}
.lib-note{font-size:.82rem;color:var(--text-secondary);line-height:1.4}
.lib-path{margin-top:auto;font-size:.7rem;color:var(--text-muted);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all;opacity:.85}
.lib-category{margin:22px 0}
.lib-cat-label{font-size:1.05rem;margin:6px 0 2px}
.lib-cat-desc{font-size:.85rem;color:var(--text-secondary);margin:0 0 10px}
.lib-category-nav{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 16px}
.lib-chip{display:inline-block;padding:6px 12px;font-size:.8rem;border:1px solid var(--border);border-radius:999px;color:var(--text-secondary);text-decoration:none;background:var(--bg-elevated)}
.lib-chip:hover{border-color:var(--accent);color:var(--accent)}
.u-section-heading{font-size:1.1rem;margin:20px 0 8px;color:var(--text-primary)}
/* ---------- In-shell Scenario list ---------- */
.scn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin:14px 0}
.scn-card{display:flex;align-items:flex-start;gap:14px;padding:16px;border:1px solid var(--border);background:var(--bg-elevated);border-radius:12px;text-decoration:none;color:var(--text-primary);position:relative;transition:transform .15s,border-color .15s,box-shadow .15s}
.scn-card:hover{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 4px 14px rgba(0,0,0,.15)}
.scn-num{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:10px;background:var(--accent);color:#fff;font-weight:800;font-size:1rem}
.scn-body{flex:1;min-width:0}
.scn-title{font-size:.95rem;font-weight:700;line-height:1.35;margin-bottom:4px}
.scn-desc{font-size:.82rem;color:var(--text-secondary);line-height:1.4;margin-bottom:8px}
.scn-tags{display:flex;flex-wrap:wrap;gap:5px}
.scn-tag{display:inline-block;padding:2px 8px;font-size:.7rem;border:1px solid var(--border);border-radius:999px;color:var(--text-secondary);background:transparent}
.scn-arrow{position:absolute;right:12px;top:12px;font-size:1.4rem;color:var(--text-muted);line-height:1}
/* ---------- Role-based home shortcuts ---------- */
.role-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:10px 0 20px}
.role-card{display:block;padding:14px 16px;border:1px solid var(--border);background:var(--bg-elevated);border-radius:12px;text-decoration:none;color:var(--text-primary);transition:transform .15s,border-color .15s,box-shadow .15s}
.role-card:hover{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.role-icon{font-size:1.3rem;margin-bottom:6px}
.role-title{font-size:.95rem;font-weight:700;margin-bottom:2px}
.role-desc{font-size:.8rem;color:var(--text-secondary);line-height:1.35}
.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ================= Redesigned Home / Command Bridge ================= */
.home-shell { max-width: 1240px; margin: 0 auto; }
.home-breadcrumbs { display: none; }
.home-shell .section-header { display: none; }

/* Hero – "Command Bridge" */
.bridge-hero {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  padding: clamp(22px, 3.2vw, 38px) clamp(22px, 3.2vw, 44px);
  background:
    radial-gradient(1200px 380px at 85% -120px, rgba(59,130,246,0.32), transparent 60%),
    radial-gradient(900px 380px at -10% 120%, rgba(16,185,129,0.18), transparent 55%),
    linear-gradient(135deg, #0f1d33 0%, #1a2f52 55%, #1f3b66 100%);
  border: 1px solid rgba(59,130,246,0.35);
  box-shadow: 0 24px 48px -20px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.05);
  color: #f1f5f9;
  margin-bottom: 26px;
}
body.light-mode .bridge-hero {
  background:
    radial-gradient(1200px 380px at 85% -120px, rgba(59,130,246,0.18), transparent 60%),
    radial-gradient(900px 380px at -10% 120%, rgba(16,185,129,0.10), transparent 55%),
    linear-gradient(135deg, #1e3a8a 0%, #1e40af 55%, #2563eb 100%);
  color: #f8fafc;
  border-color: rgba(37,99,235,0.35);
}
.bridge-hero::before {
  content: "";
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: linear-gradient(180deg, rgba(0,0,0,0.5), transparent 70%);
  pointer-events: none;
}
.bridge-hero > * { position: relative; }

.bridge-topline {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  font-size: 0.76rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: #a9c4ea;
  margin-bottom: 14px;
}
.bridge-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 999px;
  background: rgba(59,130,246,0.18);
  border: 1px solid rgba(59,130,246,0.55);
  color: #cfe0ff;
}
.bridge-badge::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: #22d3ee; box-shadow: 0 0 12px #22d3ee;
}
.bridge-dot { color: rgba(255,255,255,0.35); }
.bridge-status { color: #b4cff2; }

.bridge-hero-title {
  font-size: clamp(1.9rem, 1.2rem + 2.6vw, 3rem);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.02;
  color: #f8fafc;
  margin: 0 0 6px;
  text-shadow: 0 2px 18px rgba(0,0,0,0.35);
}
.bridge-hero-title .bridge-hero-em {
  background: linear-gradient(90deg, #60a5fa 0%, #22d3ee 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.bridge-hero-tagline {
  font-size: clamp(0.95rem, 0.82rem + 0.35vw, 1.08rem);
  color: #cfdcf0;
  margin: 0 0 4px;
  font-weight: 500;
}
.bridge-hero-desc {
  color: #b9c7dc;
  max-width: 72ch;
  line-height: 1.65;
  margin: 10px 0 20px;
  font-size: 0.95rem;
}
.bridge-hero-ctas {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 22px;
}
.bridge-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 11px 18px; border-radius: 10px;
  font-size: 0.9rem; font-weight: 700; letter-spacing: 0.01em;
  text-decoration: none;
  transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, border-color 0.15s ease;
}
.bridge-btn-primary {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #fff;
  box-shadow: 0 8px 18px -6px rgba(37,99,235,0.65), inset 0 1px 0 rgba(255,255,255,0.25);
}
.bridge-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 22px -6px rgba(37,99,235,0.75); color: #fff; text-decoration: none; }
.bridge-btn-secondary {
  background: rgba(255,255,255,0.08);
  color: #eaf1fb;
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(4px);
}
.bridge-btn-secondary:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); transform: translateY(-2px); color: #fff; text-decoration: none; }
.bridge-btn-ghost {
  background: transparent;
  color: #cfe0ff;
  border: 1px solid rgba(147,197,253,0.35);
}
.bridge-btn-ghost:hover { background: rgba(147,197,253,0.14); color: #fff; transform: translateY(-2px); text-decoration: none; }

.bridge-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  padding-top: 18px;
  border-top: 1px dashed rgba(255,255,255,0.15);
}
.bridge-stat {
  text-align: center;
  padding: 6px 4px;
}
.bridge-stat strong {
  display: block;
  font-size: clamp(1.35rem, 1rem + 0.6vw, 1.7rem);
  font-weight: 800;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}
.bridge-stat span {
  display: block;
  margin-top: 6px;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #8faac9;
}

/* Section heading shared style */
.home-section { margin: 32px 0 26px; }
.home-section-head { margin-bottom: 14px; display: flex; align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.home-section-kicker {
  font-size: 0.72rem; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
}
.home-section-title {
  font-size: clamp(1.2rem, 0.95rem + 0.8vw, 1.45rem);
  font-weight: 800;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  margin: 0;
}
.home-section-desc {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin: 4px 0 0;
  max-width: 70ch;
  line-height: 1.55;
}
.home-section-link {
  font-size: 0.82rem; font-weight: 600;
  color: var(--accent); text-decoration: none;
  white-space: nowrap;
}
.home-section-link:hover { text-decoration: underline; }

/* Mission Critical Access */
.mc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
}
.mc-card {
  position: relative;
  display: flex; flex-direction: column; gap: 10px;
  padding: 18px 20px 20px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  text-decoration: none;
  color: var(--text-primary);
  overflow: hidden;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.mc-card::before {
  content: "";
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--mc-accent, var(--accent));
}
.mc-card::after {
  content: "";
  position: absolute; right: -40px; top: -40px;
  width: 140px; height: 140px; border-radius: 50%;
  background: var(--mc-accent, var(--accent));
  opacity: 0.08;
  transition: opacity 0.2s ease;
}
.mc-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 32px -16px rgba(0,0,0,0.45);
  border-color: var(--mc-accent, var(--accent));
  color: var(--text-primary);
  text-decoration: none;
}
.mc-card:hover::after { opacity: 0.16; }
.mc-card--red { --mc-accent: #ef4444; }
.mc-card--amber { --mc-accent: #f59e0b; }
.mc-card--blue { --mc-accent: #3b82f6; }
.mc-card--teal { --mc-accent: #14b8a6; }
.mc-tag {
  align-self: flex-start;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 999px;
  font-size: 0.66rem; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--mc-accent);
  background: color-mix(in srgb, var(--mc-accent) 14%, transparent);
  border: 1px solid color-mix(in srgb, var(--mc-accent) 40%, transparent);
}
.mc-title {
  font-size: 1.12rem;
  font-weight: 800;
  line-height: 1.25;
  color: var(--text-primary);
  margin: 2px 0 0;
}
.mc-desc {
  font-size: 0.86rem;
  color: var(--text-secondary);
  line-height: 1.55;
  margin: 0;
}
.mc-cta {
  margin-top: auto;
  padding-top: 8px;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--mc-accent);
  display: inline-flex; align-items: center; gap: 6px;
}
.mc-cta span { transition: transform 0.15s ease; }
.mc-card:hover .mc-cta span { transform: translateX(3px); }

/* Phase Timeline */
.phase-timeline {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  position: relative;
}
.phase-timeline::before {
  content: "";
  position: absolute; top: 24px; left: 8%; right: 8%; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 20%, var(--accent) 80%, transparent 100%);
  opacity: 0.35;
  z-index: 0;
}
.phase-node { position: relative; z-index: 1; }
.phase-link {
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 8px 12px;
  text-decoration: none;
  color: var(--text-primary);
  border-radius: 10px;
  transition: background 0.15s ease;
}
.phase-link:hover {
  background: var(--bg-card);
  text-decoration: none;
  color: var(--text-primary);
}
.phase-marker {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--bg-card);
  border: 2px solid var(--accent);
  color: var(--accent);
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 1.1rem;
  box-shadow: 0 6px 16px -8px rgba(59,130,246,0.6);
  margin-bottom: 10px;
}
.phase-link:hover .phase-marker {
  background: var(--accent);
  color: #fff;
}
.phase-name {
  font-size: 0.92rem;
  font-weight: 800;
  text-align: center;
  margin-bottom: 4px;
}
.phase-desc {
  font-size: 0.76rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.45;
  max-width: 22ch;
}
@media (max-width: 820px) {
  .phase-timeline { grid-template-columns: 1fr 1fr; }
  .phase-timeline::before { display: none; }
}
@media (max-width: 480px) {
  .phase-timeline { grid-template-columns: 1fr; }
}

/* Deck (card grid) sections */
.deck-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.deck-card {
  display: flex; flex-direction: column; gap: 10px;
  padding: 18px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  text-decoration: none;
  color: var(--text-primary);
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  position: relative;
}
.deck-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 14px 26px -16px rgba(0,0,0,0.4);
  text-decoration: none;
  color: var(--text-primary);
}
.deck-card-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.deck-card-icon {
  width: 42px; height: 42px; border-radius: 11px;
  background: var(--accent-dim);
  color: var(--accent);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
}
.deck-card-badge {
  font-size: 0.68rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted);
  padding: 3px 9px; border-radius: 999px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
}
.deck-card-title {
  font-size: 1.02rem;
  font-weight: 800;
  letter-spacing: -0.005em;
  color: var(--text-primary);
  margin: 4px 0 0;
}
.deck-card-desc {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.55;
  margin: 0;
}
.deck-card-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 4px;
}
.deck-card-chip {
  display: inline-block;
  padding: 3px 9px;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 999px;
  text-decoration: none;
}
.deck-card:hover .deck-card-chip { border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }

/* Featured scenario */
.featured-scenario {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(0, 1fr);
  gap: 16px;
  padding: 22px 24px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 14%, var(--bg-card)) 0%, var(--bg-card) 60%);
  position: relative;
  overflow: hidden;
}
.featured-scenario::before {
  content: "";
  position: absolute; right: -60px; bottom: -60px;
  width: 220px; height: 220px; border-radius: 50%;
  background: var(--accent);
  opacity: 0.06;
}
.featured-scenario > * { position: relative; }
.featured-scenario-kicker {
  font-size: 0.68rem; font-weight: 800; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--accent);
}
.featured-scenario-title {
  font-size: clamp(1.15rem, 0.95rem + 0.7vw, 1.45rem);
  font-weight: 800;
  margin: 6px 0 6px;
  color: var(--text-primary);
}
.featured-scenario-desc {
  font-size: 0.92rem;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 14px;
  max-width: 60ch;
}
.featured-scenario-actions {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.featured-scenario-meta {
  display: flex; flex-direction: column; gap: 10px;
  align-items: flex-start;
  justify-content: center;
  padding: 14px;
  border-radius: 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
}
.featured-meta-row {
  font-size: 0.78rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.featured-meta-row strong {
  display: block;
  font-size: 0.98rem;
  font-weight: 700;
  color: var(--text-primary);
  text-transform: none;
  letter-spacing: 0;
  margin-top: 2px;
}
@media (max-width: 720px) {
  .featured-scenario { grid-template-columns: 1fr; padding: 18px; }
}

/* Home status strip / footer */
.home-status-strip {
  margin: 32px 0 12px;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap;
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.home-status-strip strong { color: var(--text-primary); }
.home-status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 11px; border-radius: 999px;
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 700;
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.home-status-pill::before {
  content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: currentColor; box-shadow: 0 0 8px currentColor;
}

@media (max-width: 768px) {
  .bridge-hero { border-radius: 14px; }
  .bridge-hero-ctas .bridge-btn { flex: 1; justify-content: center; }
  .home-section { margin: 28px 0 22px; }
  .mc-grid { grid-template-columns: 1fr; }
}

function initBackToTop(){const btn=document.getElementById('backToTop');const main=document.getElementById('appMain');if(!btn||!main)return;main.addEventListener('scroll',()=>{btn.classList.toggle('visible',main.scrollTop>300);},{ passive:true });btn.addEventListener('click',()=>main.scrollTo({top:0,behavior:'smooth'}));}
function init(){enrichAllMetadata();if(!state.darkMode)document.body.classList.add('light-mode');document.documentElement.style.setProperty('--font-scale',state.fontScale);buildSidebar();buildSearchIndex();window.addEventListener('hashchange',handleRoute);window.addEventListener('resize',()=>{if(!isMobileViewport())document.body.classList.remove('mobile-search-open');});handleRoute();initBackToTop();if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}}
const state={currentRoute:'',bookmarks:(()=>{try{return JSON.parse(localStorage.getItem('actt-bookmarks')||'[]');}catch(e){return[];}})(),darkMode:localStorage.getItem('actt-darkmode')!=='light',fontScale:(v=>{const n=parseFloat(v);return isNaN(n)?1:Math.max(0.8,Math.min(1.4,n));})(localStorage.getItem('actt-fontscale')||'1'),sidebarOpen:false,searchIndex:[],timers:[],timerIntervals:{},lastFocusedElement:null,searchFilter:localStorage.getItem('actt-search-filter')||'all',learnerProgress:(()=>{try{return JSON.parse(localStorage.getItem('actt-learner-progress')||'{"visited":{},"quiz":{}}');}catch(e){return{visited:{},quiz:{}};}})()};
function getNavSections(){return[

{id:'prolonged-holding',title:'Prolonged Holding',icon:'&#9201;',path:'#/prolonged-holding',group:'primary',items:ACTT.prolongedHolding?ACTT.prolongedHolding.sections.map(s=>({id:s.id,title:s.title,path:'#/prolonged-holding/'+s.id})):[]},

];}
function buildSidebar(){const nav=document.getElementById('sidebarNav');const sections=getNavSections();let html='';let currentGroup='';const groupLabels={primary:'Immediate Care Workflow',reference:'Supporting Reference',utilities:'Tools & Training'};sections.forEach(sec=>{if(sec.group!==currentGroup){currentGroup=sec.group;html+=`<div class="nav-group-label">${groupLabels[currentGroup]||'Navigation'}</div>`;}const hasItems=sec.items&&sec.items.length>0;const isExternal=sec.path&&!sec.path.startsWith('#');const headerAction=isExternal?`window.location.href='${sec.path}'`:(hasItems?`navigateTo('${sec.path}');toggleNavSection('${sec.id}')`:`navigateTo('${sec.path}')`);html+=`<div class="nav-section" data-section="${sec.id}">`;html+=`<div class="nav-section-header" onclick="${headerAction}" data-path="${sec.path}" role="button" tabindex="0" aria-label="Open ${sec.title}"><span class="nav-icon">${sec.icon}</span>${sec.title}`;if(hasItems)html+=`<span class="nav-chevron">&#9654;</span>`;html+=`</div>`;if(hasItems){html+=`<div class="nav-section-items" id="navItems-${sec.id}">`;sec.items.forEach(item=>{html+=`<a class="nav-item" href="${item.path}" data-path="${item.path}">${item.title}</a>`;});html+=`</div>`;}html+=`</div>`;});html+=`<div class="nav-divider"></div><div class="nav-section"><div class="nav-section-header" onclick="toggleNavSection('bookmarks')" role="button" tabindex="0"><span class="nav-icon">&#9733;</span>Bookmarks<span class="nav-chevron">&#9654;</span></div><div class="nav-section-items" id="navItems-bookmarks"><div class="bookmarks-panel" id="bookmarksPanel"></div></div></div>`;nav.innerHTML=html;updateBookmarksPanel();}

function getRecommendedNextStep(){const domains=['algorithms','procedures','medications'];for(const d of domains){if(!state.learnerProgress.quiz[d])return{path:'#/quiz/'+d,label:'Take '+d+' micro-quiz'};}const lowest=domains.map(d=>({d,p:(state.learnerProgress.quiz[d].score/state.learnerProgress.quiz[d].total)||0})).sort((a,b)=>a.p-b.p)[0];if(lowest&&lowest.p<0.8)return{path:'#/quiz/'+lowest.d,label:'Retake '+lowest.d+' quiz ('+Math.round(lowest.p*100)+'%)'};return{path:'#/checklists',label:'Run a clinical checklist refresh'};}

  const sub=parts.slice(1).join('/');
  // Always-valid topic routes (rendered by dedicated handlers)
  if(topic==='home'||topic==='library'||topic==='scenarios'||topic==='quiz'||topic==='cct')return true;
  if(topic==='tools'){const validTools=['gcs','burn','dosecalc','timer','interactions','ddx'];return !sub||validTools.indexOf(sub)>=0;}

    'sickbay':ACTT.sickbay,'sickbay-meds':ACTT.sickbayMeds,'domains':ACTT.domains,
    'thresholds':ACTT.thresholds,'pitfalls':ACTT.pitfalls,'prolonged-holding':ACTT.prolongedHolding,

    'study':ACTT.study,'appendices':ACTT.appendices,'checklists':ACTT.checklists
  };

function renderSection(main,data,sectionId,parentTitle,parentPath){
if(!data){main.innerHTML='<div class="loading">Content loading...</div>';return;}
if(parentPath==='#/sickbay-meds'&&!sectionId){renderSickBayMedLibrary(main,data,parentTitle,parentPath);return;}
const cleanSubtitle=stripChapterLabel(data.subtitle||'');
if(sectionId){
const sec=data.sections?.find(s=>s.id===sectionId);
if(!sec){main.innerHTML='<div class="severity-card amber"><div class="sc-title">Section not found</div></div>';return;}
markVisited(parentPath+'/'+sectionId);
let html='<div class="content-shell">'+renderSectionHeader(sec.title,stripChapterLabel(sec.subtitle||''),[{title:'Home',path:'#/'},{title:parentTitle,path:parentPath},{title:sec.title,path:parentPath+'/'+sectionId}]);
html+=renderMetadataBanner(sec.meta);
html+=renderSectionNavActions(parentTitle,parentPath,data,sectionId);
html+='<div class="expand-collapse-btns"><button class="btn btn-outline btn-sm" onclick="expandAll(document.getElementById(&quot;appMain&quot;))">Expand All</button><button class="btn btn-outline btn-sm" onclick="collapseAll(document.getElementById(&quot;appMain&quot;))">Collapse All</button></div>';
html+='<div class="content-section">'+formatTopicContent(sec.content||'')+'</div>';
if(parentPath==='#/algorithms')html+='<div style="margin:8px 0 18px"><a class="btn btn-outline" href="#/checklists">Open Checklists Folder &#8250;</a></div>';
if(sec.sources)html+=renderSourceDocuments(sec.sources);
if(sec.relatedLinks)html+=renderRelatedContent(sec.relatedLinks);
html+='</div>';
main.innerHTML=html;
}else{
let html='<div class="content-shell">'+renderSectionHeader(data.title,cleanSubtitle,[{title:'Home',path:'#/'},{title:data.title,path:parentPath}]);
html+=renderSectionNavActions('Home','#/');
const next=getRecommendedNextStep();
html+='<div class="severity-card green" style="margin-bottom:16px"><div class="sc-title">Recommended next step</div><p>Based on saved progress: <a href="'+next.path+'">'+next.label+'</a></p></div>';
if(['#/algorithms','#/procedures','#/medications'].includes(parentPath)){const key=parentPath.replace('#/','');html+='<div class="quiz-block"><strong>Micro-quiz available:</strong> 3 rapid retrieval questions for '+escapeHtml(data.title)+'. <a href="#/quiz/'+key+'">Start now &#8250;</a></div>';}
if(data.sections.length>0){html+='<div class="section-quick-links">';data.sections.forEach(sec=>{html+=`<a class="section-quick-link" href="${parentPath}/${sec.id}">${sec.title}</a>`;});html+='</div>';}
if(data.intro){if(data.sections.length===0){html+=data.intro;}else{html+=renderContextDetails(data.intro,'Background and chapter context');}}
html+='</div>';
main.innerHTML=html;
}}
function escapeHtml(value){return String(value).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function renderSickBayMedLibrary(main,data,parentTitle,parentPath){

main.innerHTML=html;
}
function filterSickBayMeds(query){const q=(query||'').trim().toLowerCase();document.querySelectorAll('.sickbay-med-btn').forEach(btn=>{const show=!q||btn.dataset.medTitle.includes(q);btn.style.display=show?'block':'none';});document.querySelectorAll('.sickbay-group').forEach(group=>{const hasVisible=[...group.querySelectorAll('.sickbay-med-btn')].some(btn=>btn.style.display!=='none');group.style.display=hasVisible?'block':'none';});}
function renderTools(main,toolId){if(!toolId){let html=renderSectionHeader('Clinical Tools','Bedside calculators and decision support tools',[{title:'Home',path:'#/'},{title:'Clinical Tools',path:'#/tools'}]);html+='<div class="cards-grid">';[{id:'gcs',icon:'&#129504;',title:'GCS Calculator',desc:'Glasgow Coma Scale with airway threshold alerts'},{id:'burn',icon:'&#128293;',title:'Burn Calculator',desc:'Rule of 10s fluid resuscitation rate'},{id:'dosecalc',icon:'&#9878;',title:'Medication Dose Calculator',desc:'Weight-based dose calculations'},{id:'timer',icon:'&#9201;',title:'Reassessment Timer',desc:'Interval reminders with checklists'},{id:'interactions',icon:'&#9763;',title:'Drug Interaction Checker',desc:'Check medication combinations'},{id:'ddx',icon:'&#128270;',title:'Differential Diagnosis Helper',desc:'Symptom-based differential'}].forEach(t=>{html+=`<a class="quick-card" href="#/tools/${t.id}"><div class="qc-icon">${t.icon}</div><div class="qc-title">${t.title}</div><div class="qc-desc">${t.desc}</div></a>`;});html+='</div>';main.innerHTML=html;return;}const toolFns=ACTT.toolRenderers||{};if(toolFns[toolId]){toolFns[toolId](main);}else{main.innerHTML=`<div class="severity-card amber"><div class="sc-title">Tool not found: ${escHtml(toolId)}</div></div>`;}}
function opClKey(id){return'actt-opcl-'+id;}

function renderOperationalChecklist(main,sec){const st=getOpClState(sec.id);if(!st.date)st.date=new Date().toISOString().split('T')[0];const prog=opClProgress(sec.id);let html=renderSectionHeader(sec.title,sec.badge||'',[{title:'Home',path:'#/'},{title:'Checklists',path:'#/checklists'},{title:sec.title,path:'#/checklists/'+sec.id}]);html+='<div class="op-cl-actions"><button class="btn btn-primary" onclick="window.print()">&#128424; Print / Save PDF</button><button class="btn btn-outline" onclick="emailOpChecklist(\''+sec.id+'\')">&#128231; Email Summary</button><button class="btn btn-outline" onclick="resetOpCl(\''+sec.id+'\')">&#8635; Reset All</button></div>';html+='<div class="op-cl-meta"><label>Vessel<input type="text" placeholder="Ship name" value="'+escHtml(st.vessel||'')+'" oninput="saveOpClMeta(\''+sec.id+'\',\'vessel\',this.value)"></label><label>Date<input type="date" value="'+(st.date||'')+'" oninput="saveOpClMeta(\''+sec.id+'\',\'date\',this.value)"></label><label>Completed By<input type="text" placeholder="Name / Initials" value="'+escHtml(st.completedBy||'')+'" oninput="saveOpClMeta(\''+sec.id+'\',\'completedBy\',this.value)"></label></div>';if(sec.preamble)html+='<div class="op-cl-preamble">'+escHtml(sec.preamble)+'</div>';html+='<div class="op-cl-summary">Items: <strong>'+prog.total+'</strong> &nbsp;&nbsp; Verified Present: <strong>'+prog.present+'/'+prog.total+'</strong> &nbsp;&nbsp; Verified Serviceable: <strong>'+prog.serviceable+'/'+prog.total+'</strong></div>';let curSection='';(sec.groups||[]).forEach(g=>{if(g.section&&g.section!==curSection){curSection=g.section;html+='<div class="op-cl-section-hdr">'+g.section+'</div>';}else if(!g.section){html+='<div style="margin-top:16px"></div>';}html+='<div class="op-cl-group-hdr">'+g.title+'</div>';html+='<div class="table-wrapper"><table class="op-cl-table"><thead><tr><th style="min-width:200px">Checklist Item</th><th style="width:90px;text-align:center">Verified<br>Present<br><small>(initial)</small></th><th style="width:90px;text-align:center">Verified<br>Serviceable<br><small>(initial)</small></th><th style="min-width:160px">Notes</th></tr></thead><tbody>';(g.items||[]).forEach(item=>{const d=(st.items&&st.items[item.id])||{};const pFilled=d.present&&d.present.trim()?'filled':'';const sFilled=d.serviceable&&d.serviceable.trim()?'filled':'';html+='<tr><td><div class="item-label">'+item.label+'</div>'+(item.notes?'<div class="item-note">'+item.notes+'</div>':'')+'</td>';html+='<td style="text-align:center"><input class="op-cl-initial '+pFilled+'" type="text" maxlength="8" placeholder="___" value="'+escHtml(d.present||'')+'" data-item="'+item.id+'" data-field="present" oninput="saveOpClField(\''+sec.id+'\',\''+item.id+'\',\'present\',this.value)" aria-label="Verified Present"></td>';html+='<td style="text-align:center"><input class="op-cl-initial '+sFilled+'" type="text" maxlength="8" placeholder="___" value="'+escHtml(d.serviceable||'')+'" data-item="'+item.id+'" data-field="serviceable" oninput="saveOpClField(\''+sec.id+'\',\''+item.id+'\',\'serviceable\',this.value)" aria-label="Verified Serviceable"></td>';html+='<td><textarea class="op-cl-user-notes" rows="2" placeholder="Additional notes..." oninput="saveOpClField(\''+sec.id+'\',\''+item.id+'\',\'notes\',this.value)">'+escHtml(d.notes||'')+'</textarea></td></tr>';});html+='</tbody></table></div>';});if(sec.sources)html+=renderSourceDocuments(sec.sources);html+='<div class="op-cl-actions" style="margin-top:24px"><button class="btn btn-primary" onclick="window.print()">&#128424; Print / Save PDF</button><button class="btn btn-outline" onclick="emailOpChecklist(\''+sec.id+'\')">&#128231; Email Summary</button><button class="btn btn-outline" onclick="resetOpCl(\''+sec.id+'\')">&#8635; Reset All</button></div>';main.innerHTML=html;}

="text" placeholder="Priority '+p+' item" value="'+escHtml(st['priority'+p]||'')+'" style="min-width:150px" oninput="saveOpClMeta(\''+sec.id+'\',\'priority'+p+'\',this.value)"></label>';}html+='</div>';if(sec.preamble)html+='<div class="op-cl-preamble">'+escHtml(sec.preamble)+'</div>';html+='<div class="op-cl-summary">Items: <strong>'+prog.total+'</strong> &nbsp;&nbsp; Completed: <strong>'+prog.done+' / '+prog.total+'</strong> &nbsp;&nbsp; <strong>'+pct+'%</strong></div>';sec.groups.forEach(g=>{html+='<div class="op-cl-section-hdr">'+g.section+'</div>';html+='<div class="table-wrapper"><table class="op-cl-table"><thead><tr><th style="width:36px;text-align:center">#</th><th style="min-width:220px">Checklist Item</th>';(g.columns||[]).forEach(col=>{html+='<th style="width:80px;text-align:center">'+escHtml(col.label)+'<br><small>(initial)</small></th>';});html+='<th style="min-width:160px">Notes</th></tr></thead><tbody>';(g.items||[]).forEach(item=>{const d=(st.items&&st.items[item.id])||{};html+='<tr><td style="text-align:center;color:var(--text-muted);font-size:0.8rem;white-space:nowrap">'+item.serial+'</td><td><div class="item-label">'+item.label+'</div></td>';(g.columns||[]).forEach(col=>{const v=d[col.id]||'';const filled=v.trim()?'filled':'';html+='<td style="text-align:center"><input class="op-cl-initial '+filled+'" type="text" maxlength="8" placeholder="___" value="'+escHtml(v)+'" oninput="saveOpClField(\''+sec.id+'\',\''+item.id+'\',\''+col.id+'\',this.value)" aria-label="'+escHtml(col.label)+'"></td>';});html+='<td><textarea class="op-cl-user-notes" rows="2" placeholder="Notes..." oninput="saveOpClField(\''+sec.id+'\',\''+item.id+'\',\'notes\',this.value)">'+escHtml(d.notes||'')+'</textarea></td></tr>';});html+='</tbody></table></div>';});if(sec.sources)html+=renderSourceDocuments(sec.sources);html+='<div class="op-cl-actions" style="margin-top:24px"><button class="btn btn-primary" onclick="window.print()">&#128424; Print / Save PDF</button><button class="btn btn-outline" onclick="emailInspChecklist(\''+sec.id+'\')">&#128231; Email Summary</button><button class="btn btn-outline" onclick="resetOpCl(\''+sec.id+'\')">&#8635; Reset All</button></div>';main.innerHTML=html;}

function toggleClItem(checklistId,idx){const key='actt-cl-'+checklistId;const arr=safeParseArray(key);const pos=arr.indexOf(idx);if(pos>=0)arr.splice(pos,1);else arr.push(idx);localStorage.setItem(key,JSON.stringify(arr));const item=document.querySelector('.cl-item[data-idx="'+idx+'"]');if(item){const isDone=arr.includes(idx);item.classList.toggle('cl-done',isDone);item.setAttribute('aria-pressed',isDone?'true':'false');item.querySelector('.cl-check').innerHTML=isDone?'&#10003;':'';}const sec=ACTT.checklists&&ACTT.checklists.sections.find(s=>s.id===checklistId);if(sec){const pct=Math.round(arr.length/sec.items.length*100);const pEl=document.querySelector('.cl-progress-count');if(pEl)pEl.textContent=arr.length+' / '+sec.items.length+' complete';const bEl=document.querySelector('.cl-progress-bar-fill');if(bEl)bEl.style.width=pct+'%';const ptEl=document.querySelector('.cl-progress-pct');if(ptEl)ptEl.textContent=pct+'%';}markVisited('#/checklists/'+checklistId);}

function renderChecklists(main,sub){const data=ACTT.checklists;if(!data){main.innerHTML='<div class="loading">Loading checklists...</div>';return;}if(sub){const sec=data.sections?.find(s=>s.id===sub);if(!sec){main.innerHTML='<div class="severity-card amber"><div class="sc-title">Checklist not found</div></div>';return;}let html=renderSectionHeader(sec.title,sec.badge||'',[{title:'Home',path:'#/'},{title:'Checklists',path:'#/checklists'},{title:sec.title,path:'#/checklists/'+sub}]);if(sec.type==='placeholder'){html+='<div class="content-section"><div class="severity-card amber" style="margin-bottom:20px"><div class="sc-title">Coming Soon</div><p>'+sec.desc+'</p><p style="margin-top:8px;color:var(--text-muted);font-size:0.85rem">Drop the official PDF into <code>data/checklists/pdf/</code> and this page will be updated to link to it.</p></div></div>';main.innerHTML=html;return;}if(sec.type==='operational'){renderOperationalChecklist(main,sec);return;}if(sec.type==='inspection'){renderInspectionChecklist(main,sec);return;}const key='actt-cl-'+sub;const checked=safeParseArray(key);const total=sec.items.length;const done=checked.length;const pct=total>0?Math.round(done/total*100):0;html+='<div class="cl-progress"><div class="cl-progress-bar"><div class="cl-progress-bar-fill" style="width:'+pct+'%"></div></div><span class="cl-progress-count">'+done+' / '+total+' complete</span><span class="cl-progress-pct">'+pct+'%</span></div>';html+='<div class="cl-list">';sec.items.forEach((item,i)=>{const isDone=checked.includes(i);html+='<button type="button" class="cl-item'+(isDone?' cl-done':'')+'" data-idx="'+i+'" aria-pressed="'+(isDone?'true':'false')+'" onclick="toggleClItem(\''+sub+'\','+i+')" onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();toggleClItem(\''+sub+'\','+i+');}"><span class="cl-check">'+(isDone?'&#10003;':''  )+'</span><span class="cl-text">'+item+'</span></button>';});html+='</div><div style="margin-top:4px;display:flex;gap:10px;flex-wrap:wrap">';if(sec.crossLink)html+='<a class="btn btn-outline" href="'+sec.crossLink+'">View '+sec.crossLinkTitle+' &#8250;</a>';html+='<button class="btn btn-outline" onclick="resetCl(\''+sub+'\')">&#8635; Reset Checklist</button></div>';if(sec.sources)html+=renderSourceDocuments(sec.sources);main.innerHTML=html;return;}const clinical=data.sections.filter(s=>s.type==='clinical');const operational=data.sections.filter(s=>s.type!=='clinical');let html=renderSectionHeader(data.title,data.subtitle,[{title:'Home',path:'#/'},{title:'Checklists',path:'#/checklists'}]);html+='<div class="content-section"><p style="color:var(--text-secondary);font-size:0.92rem;line-height:1.6">Clinical cognitive aids for use during emergencies, and operational readiness checklists for routine sick bay management. Clinical aids are interactive with progress tracking — tap any item to mark it complete.</p></div>';if(clinical.length){html+='<h2 style="margin-bottom:16px">Clinical Cognitive Aids</h2><div class="cards-grid">';clinical.forEach(s=>{const done=safeParseArray('actt-cl-'+s.id).length;const total=s.items?s.items.length:0;html+='<a class="quick-card" href="#/checklists/'+s.id+'"><div class="qc-icon">'+s.icon+'</div><div class="qc-title">'+s.title+'</div><div class="qc-desc">'+s.desc+'</div>'+(done>0?'<div style="margin-top:8px;font-size:0.8rem;color:var(--accent)">'+done+'/'+total+' complete</div>':'')+'</a>';});html+='</div>';}if(operational.length){html+='<h2 style="margin:24px 0 16px">Operational Checklists</h2><div class="cards-grid">';operational.forEach(s=>{if(s.type==='operational'&&s.groups&&s.groups.length){const prog=opClProgress(s.id);const pct=prog.total>0?Math.round((prog.present+prog.serviceable)/(prog.total*2)*100):0;html+='<a class="quick-card" href="#/checklists/'+s.id+'"><div class="qc-icon">'+s.icon+'</div><div class="qc-title">'+s.title+'</div><div class="qc-desc">'+s.desc+'</div>'+(pct>0?'<div style="margin-top:8px;font-size:0.8rem;color:var(--accent)">'+pct+'% complete</div>':'')+'</a>';}else if(s.type==='inspection'&&s.groups&&s.groups.length){const prog=inspClProgress(s.id);const pct=prog.total>0?Math.round(prog.done/prog.total*100):0;html+='<a class="quick-card" href="#/checklists/'+s.id+'"><div class="qc-icon">'+s.icon+'</div><div class="qc-title">'+s.title+'</div><div class="qc-desc">'+s.desc+'</div>'+(pct>0?'<div style="margin-top:8px;font-size:0.8rem;color:var(--accent)">'+pct+'% complete</div>':'')+'</a>';}else{html+='<div class="quick-card" style="opacity:0.6;cursor:default"><div class="qc-icon">'+s.icon+'</div><div class="qc-title">'+s.title+'<span style="font-size:0.7rem;background:var(--bg-tertiary);color:var(--text-muted);padding:2px 6px;border-radius:4px;margin-left:8px;vertical-align:middle">Pending</span></div><div class="qc-desc">'+s.desc+'</div></div>';}});html+='</div>';}main.innerHTML=html;}

function renderQuiz(main,domain){const set=QUIZ_BANK[domain];if(!set){main.innerHTML='<div class="severity-card amber"><div class="sc-title">Quiz not found</div></div>';return;}let html='<div class="content-shell">'+renderSectionHeader('Micro-quiz: '+domain.charAt(0).toUpperCase()+domain.slice(1),'Rapid retrieval practice (3 questions)',[{title:'Home',path:'#/'},{title:'Quiz',path:'#/quiz/'+domain}]);const prior=state.learnerProgress.quiz[domain];if(prior)html+='<div class="progress-hint">Previous score: '+prior.score+' / '+prior.total+' ('+Math.round(prior.score/prior.total*100)+'%)</div>';html+='<div id="quizWrap">';set.forEach((item,i)=>{html+='<div class="quiz-block"><div><strong>Q'+(i+1)+'.</strong> '+escapeHtml(item.q)+'</div>';item.options.forEach((opt,oi)=>{html+='<button class="quiz-option" type="button" onclick="gradeQuizOption(this,'+i+','+oi+',\''+domain+'\')">'+escapeHtml(opt)+'</button>';});html+='<div class="progress-hint" id="quizFeedback'+i+'"></div></div>';});html+='</div><div class="op-cl-actions"><button class="btn btn-outline" onclick="window.location.hash=\'#/'+domain+'\'">Back to '+domain+'</button></div></div>';main.innerHTML=html;}
function gradeQuizOption(btn,qIdx,oIdx,domain){const q=QUIZ_BANK[domain][qIdx];const block=btn.closest('.quiz-block');const opts=block.querySelectorAll('.quiz-option');opts.forEach((el,i)=>{el.disabled=true;if(i===q.answer)el.classList.add('correct');else if(i===oIdx)el.classList.add('incorrect');});const fb=document.getElementById('quizFeedback'+qIdx);fb.textContent=oIdx===q.answer?'Correct.':'Review this section and retry.';setTimeout(()=>{const blocks=[...document.querySelectorAll('.quiz-block')];const finished=blocks.every(b=>[...b.querySelectorAll('.quiz-option')].some(o=>o.disabled));if(finished){let score=0;blocks.forEach((b,i)=>{const corr=b.querySelectorAll('.quiz-option')[QUIZ_BANK[domain][i].answer];if(corr&&corr.classList.contains('correct'))score++;});recordQuizScore(domain,score,QUIZ_BANK[domain].length);markVisited('#/quiz/'+domain);}},20);}

/* ---------- Reference Library ---------- */
function libraryFileHref(item){
  var base=item.basePath!==undefined?item.basePath:'DL information/';
  return encodeURI(base+item.file);
}
function libraryItemCard(item){
  var href=escapeHtml(libraryFileHref(item));
  var title=escapeHtml(item.title||item.file||'Document');
  var ext=(item.file||'').split('.').pop().toUpperCase();
  var note=item.note?'<div class="lib-note">'+escapeHtml(item.note)+'</div>':'';
  var tag=item.tag?'<span class="lib-tag">'+escapeHtml(item.tag)+'</span>':'';
  return '<a class="lib-card" href="'+href+'" target="_blank" rel="noopener">'+
    '<div class="lib-card-top"><span class="lib-ext">'+escapeHtml(ext)+'</span>'+tag+'</div>'+
    '<div class="lib-title">'+title+'</div>'+
    note+
    '<div class="lib-path">'+escapeHtml((item.basePath!==undefined?item.basePath:'DL information/')+item.file)+'</div>'+
    '</a>';
}
function renderLibrary(main,sub){
  var data=ACTT.library;
  if(!data){main.innerHTML='<div class="loading">Loading reference library...</div>';return;}
  var crumbs=[{title:'Home',path:'#/'},{title:data.title,path:'#/library'}];
  var html='<div class="content-shell">'+renderSectionHeader(data.title,data.subtitle,crumbs);
  html+=renderSectionNavActions('Home','#/');
  html+='<div class="content-section">'+data.intro+'</div>';
  html+='<div class="lib-filter"><label for="libFilter" class="visually-hidden">Filter reference library</label>'+
    '<input type="search" id="libFilter" class="tool-input" placeholder="Filter documents by title or topic..." oninput="filterLibrary(this.value)" autocomplete="off"></div>';
  if(!sub&&data.featured&&data.featured.length){
    html+='<h2 class="u-section-heading">Featured</h2><div class="lib-grid lib-grid-featured">';
    data.featured.forEach(function(it){html+=libraryItemCard(it);});
    html+='</div>';
  }
  html+='<h2 class="u-section-heading">Browse by Topic</h2>';
  html+='<div class="lib-category-nav">';
  data.categories.forEach(function(cat){
    html+='<a class="lib-chip" href="#/library/'+cat.id+'" data-lib-chip="'+cat.id+'">'+escapeHtml(cat.label)+'</a>';
  });
  html+='</div>';
  var cats=sub?data.categories.filter(function(c){return c.id===sub;}):data.categories;
  if(sub&&cats.length===0){
    html+='<div class="severity-card amber"><div class="sc-title">Category not found</div><p>Browse all categories <a href="#/library">here</a>.</p></div>';
  }
  cats.forEach(function(cat){
    html+='<section class="lib-category" id="libcat-'+escapeHtml(cat.id)+'">';
    html+='<h3 class="lib-cat-label">'+escapeHtml(cat.label)+'</h3>';
    if(cat.desc)html+='<p class="lib-cat-desc">'+escapeHtml(cat.desc)+'</p>';
    html+='<div class="lib-grid">';
    cat.items.forEach(function(it){html+=libraryItemCard(it);});
    html+='</div></section>';
  });
  html+='</div>';
  main.innerHTML=html;
}
function filterLibrary(query){
  var q=(query||'').trim().toLowerCase();
  document.querySelectorAll('.lib-card').forEach(function(card){
    var text=card.textContent.toLowerCase();
    card.style.display=(!q||text.indexOf(q)>=0)?'':'none';
  });
  document.querySelectorAll('.lib-category').forEach(function(cat){
    var visible=Array.from(cat.querySelectorAll('.lib-card')).some(function(c){return c.style.display!=='none';});
    cat.style.display=visible?'':'none';
  });
}

function seedLibrarySearchEntries(){
  if(!ACTT.library)return [];
  var out=[];
  (ACTT.library.featured||[]).concat((ACTT.library.categories||[]).flatMap(function(c){return c.items.map(function(i){return Object.assign({_cat:c.label},i);});})).forEach(function(it){
    out.push({
      title:it.title,
      path:'#/library'+(it._cat?'':''),
      section:'Reference Library'+(it._cat?' — '+it._cat:''),
      topic:'library',
      text:(it.note||'')+' '+(it.file||''),
      externalHref:libraryFileHref(it)
    });
  });
  return out;
}
function buildSearchIndex(){state.searchIndex=[];const dataSets={domains:ACTT.domains,algorithms:ACTT.algorithms,procedures:ACTT.procedures,medications:ACTT.medications,sickbay:ACTT.sickbay,'sickbay-meds':ACTT.sickbayMeds,'prolonged-holding':ACTT.prolongedHolding,thresholds:ACTT.thresholds,pitfalls:ACTT.pitfalls,shipboard:ACTT.shipboard,team:ACTT.team,'casualty-clearing-team':ACTT.casualtyClearingTeam,study:ACTT.study,appendices:ACTT.appendices,checklists:ACTT.checklists};Object.entries(dataSets).forEach(([key,data])=>{if(!data||!data.sections)return;data.sections.forEach(sec=>{const text=(sec.content||(sec.items||[]).join(', ')||((sec.groups||[]).flatMap(g=>(g.items||[]).map(i=>i.label+(i.notes?' '+i.notes:''))).join(', '))).replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();state.searchIndex.push({id:sec.id,title:sec.title,text:text.substring(0,500),fullText:text,section:data.title,path:`#/${key}/${sec.id}`,severity:sec.severity,topic:key});});});
  // Seed standalone pages so header search can reach them.
  STATIC_SEARCH_ENTRIES.forEach(function(e){state.searchIndex.push({id:e.path,title:e.title,text:e.text,fullText:e.title+' '+e.text,section:e.section,path:e.path,topic:e.topic||'all'});});
  seedLibrarySearchEntries().forEach(function(e){state.searchIndex.push({id:e.path+':'+e.title,title:e.title,text:e.text,fullText:e.title+' '+e.text,section:e.section,path:e.externalHref||e.path,topic:e.topic||'all'});});
}
function isMobileViewport(){return window.matchMedia('(max-width: 768px)').matches;}
function toggleMobileSearch(forceOpen){
  if(!isMobileViewport())return;
  const shouldOpen=typeof forceOpen==='boolean'?forceOpen:!document.body.classList.contains('mobile-search-open');
  document.body.classList.toggle('mobile-search-open',shouldOpen);
  const input=document.getElementById('searchInput');
  const results=document.getElementById('searchResults');
  if(shouldOpen){setTimeout(()=>input.focus(),20);}
  else {input.value='';results.classList.remove('active');}
}
function goToSearchResult(path){
  const results=document.getElementById('searchResults');
  const input=document.getElementById('searchInput');
  if(results)results.classList.remove('active');
  if(input)input.value='';
  if(window.matchMedia('(max-width: 768px)').matches){document.body.classList.remove('mobile-search-open');}
  if(!path)return;
  if(path.indexOf('#')===0){window.location.hash=path.substring(1);return;}
  // External path (standalone html or source PDF)
  window.open(path,'_blank','noopener');
}
function handleSearch(query){const results=document.getElementById('searchResults');if(!query||query.length<2){results.classList.remove('active');announceSearchResults('');return;}const terms=expandTerms(query);let matches=state.searchIndex.filter(item=>{if(state.searchFilter!=='all'&&item.topic!==state.searchFilter)return false;const searchable=(item.title+' '+item.fullText).toLowerCase();return terms.every(t=>searchable.includes(t));}).slice(0,15);if(matches.length===0){results.innerHTML='<div class="search-result-item"><div class="sr-title">No results found</div></div>';results.classList.add('active');announceSearchResults('No results found');return;}results.innerHTML=matches.map((m,i)=>{const idx=m.fullText.toLowerCase().indexOf(terms[0]);const start=Math.max(0,idx-40);const snippet='...'+m.fullText.substring(start,start+120)+'...';let highlighted=snippet;terms.forEach(t=>{highlighted=highlighted.replace(new RegExp(`(${t.replace(/[.*+?^${}()|[\\]\\\\]/g,'\\\\$&')})`,'gi'),'<mark>$1</mark>');});const safePath=String(m.path).replace(/'/g,"\\'");return`<button type="button" class="search-result-item" role="option" aria-selected="${i===0?'true':'false'}" onclick="goToSearchResult('${safePath}')"><div class="sr-section">${m.section}</div><div class="sr-title">${m.title}</div><div class="sr-snippet">${highlighted}</div></button>`;}).join('');results.classList.add('active');announceSearchResults(matches.length+' results shown');}
function showSearchResults(){const val=document.getElementById('searchInput').value;if(val&&val.length>=2)document.getElementById('searchResults').classList.add('active');}
function closeSearchResults(clearInput=false){
  const results=document.getElementById('searchResults');
  const input=document.getElementById('searchInput');
  results.classList.remove('active');
  if(clearInput)input.value='';
  input.blur();
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-container'))document.getElementById('searchResults').classList.remove('active');
  if(isMobileViewport()&&document.body.classList.contains('mobile-search-open')&&!e.target.closest('.search-container')&&!e.target.closest('.more-actions'))toggleMobileSearch(false);
  if(!e.target.closest('.search-container'))closeSearchResults();
  if(!e.target.closest('.more-actions'))document.querySelectorAll('.more-actions[open]').forEach(el=>el.removeAttribute('open'));
});
document.querySelectorAll('.more-actions-panel button').forEach(btn=>btn.addEventListener('click',()=>{
  const menu=document.querySelector('.more-actions[open]');
  if(menu)menu.removeAttribute('open');
}));
function toggleDarkMode(){state.darkMode=!state.darkMode;document.body.classList.toggle('light-mode',!state.darkMode);localStorage.setItem('actt-darkmode',state.darkMode?'dark':'light');document.getElementById('darkModeBtn').innerHTML=state.darkMode?'&#9789;':'&#9788;';}
function changeFontSize(dir){state.fontScale=Math.max(0.8,Math.min(1.4,state.fontScale+dir*0.1));document.documentElement.style.setProperty('--font-scale',state.fontScale);localStorage.setItem('actt-fontscale',state.fontScale);}
function showToast(msg,type='info'){const c=document.getElementById('toastContainer');if(!c)return;const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),2600);}
function toggleBookmark(){const route=state.currentRoute||'#/';const idx=state.bookmarks.indexOf(route);if(idx>=0){state.bookmarks.splice(idx,1);showToast('Bookmark removed','info');}else{state.bookmarks.push(route);showToast('Bookmarked!','success');}localStorage.setItem('actt-bookmarks',JSON.stringify(state.bookmarks));updateBookmarkBtn();updateBookmarksPanel();}
function updateBookmarkBtn(){const btn=document.getElementById('bookmarkBtn');const isB=state.bookmarks.includes(state.currentRoute);btn.innerHTML=isB?'&#9733;':'&#9734;';btn.classList.toggle('active',isB);}
function updateBookmarksPanel(){const panel=document.getElementById('bookmarksPanel');if(!panel)return;if(state.bookmarks.length===0){panel.innerHTML='<div style="padding:8px 16px;font-size:0.85rem;color:var(--text-muted)">No bookmarks yet</div>';return;}panel.innerHTML=state.bookmarks.map(b=>{const title=b.replace('#/','').replace(/\//g,' > ')||'Home';return`<div class="bookmark-item" style="display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:0.85rem;color:var(--text-secondary);cursor:pointer" onclick="window.location.hash='${b.replace('#','')}'"><span>${title}</span><span style="color:var(--severity-red);font-size:12px;margin-left:auto;opacity:0.5;cursor:pointer" onclick="event.stopPropagation();removeBookmark('${b}')">&#10005;</span></div>`;}).join('');}
function removeBookmark(route){state.bookmarks=state.bookmarks.filter(b=>b!==route);localStorage.setItem('actt-bookmarks',JSON.stringify(state.bookmarks));updateBookmarkBtn();updateBookmarksPanel();}
window.addEventListener('resize',()=>{if(window.innerWidth>768&&state.sidebarOpen)toggleSidebar(false);});
function getSidebarFocusableElements(){return Array.from(document.querySelectorAll('#appSidebar a[href], #appSidebar button:not([disabled]), #appSidebar [tabindex]:not([tabindex="-1"]), #appSidebar input:not([disabled]), #appSidebar select:not([disabled]), #appSidebar textarea:not([disabled])')).filter(el=>el.offsetParent!==null);}
function setSidebarOpen(isOpen){state.sidebarOpen=isOpen;const sidebar=document.getElementById('appSidebar');const overlay=document.getElementById('sidebarOverlay');const menuToggle=document.querySelector('.menu-toggle');sidebar.classList.toggle('open',isOpen);overlay.classList.toggle('active',isOpen);document.body.classList.toggle('sidebar-open',isOpen);sidebar.setAttribute('aria-hidden',isOpen?'false':'true');if(menuToggle)menuToggle.setAttribute('aria-expanded',isOpen?'true':'false');if(isOpen){state.lastFocusedElement=document.activeElement;const first=getSidebarFocusableElements()[0];if(first)first.focus();}else if(state.lastFocusedElement&&typeof state.lastFocusedElement.focus==='function'){state.lastFocusedElement.focus();state.lastFocusedElement=null;}}
function openSidebar(){state.sidebarOpen=true;document.getElementById('appSidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('active');}
function closeSidebar(){state.sidebarOpen=false;document.getElementById('appSidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('active');}
function toggleSidebar(){if(state.sidebarOpen)closeSidebar();else openSidebar();}
function printSection(){window.print();}
document.addEventListener('keydown',e=>{
  if(e.target.classList&&e.target.classList.contains('nav-section-header')&&(e.key==='Enter'||e.key===' ')){e.preventDefault();e.target.click();return;}
  if(!state.sidebarOpen)return;
  if(e.key==='Escape'){e.preventDefault();closeSidebar();return;}
  if(e.key!=='Tab')return;
  const focusable=getSidebarFocusableElements();
  if(!focusable.length)return;
  const first=focusable[0],last=focusable[focusable.length-1],active=document.activeElement;
  if(e.shiftKey){if(active===first||!document.getElementById('appSidebar').contains(active)){e.preventDefault();last.focus();}}
  else if(active===last||!document.getElementById('appSidebar').contains(active)){e.preventDefault();first.focus();}
});
document.addEventListener('DOMContentLoaded',init);
</script>
